name: Publish to PyPI
# release-please opens/merges the release PR, bumps the version (pyproject +
# vex/__init__.py), tags it, and creates the GitHub Release. On a freshly created
# release this same workflow builds + publishes vex-ioc to PyPI via an OIDC
# Trusted Publisher (no long-lived token). The publish job runs DIRECTLY here
# (not via a reusable workflow) so the OIDC workflow claim is unambiguously
# `publish.yml` — the PyPI Trusted Publisher is matched to this filename. The
# `pypi` GitHub Environment (required reviewer) gates the upload.
on:
  push:
    branches: [main]

# Least-privilege default; the release-please job below re-grants what it needs.
permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build + publish vex-ioc to PyPI (OIDC)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for the Trusted Publisher
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
