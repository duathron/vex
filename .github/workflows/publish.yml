name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v1.0.0, v1.1.0, v2.0.0, etc.

jobs:
  build-and-publish:
    name: Build and publish vex-ioc
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to create the GitHub Release

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md (between its header and the next "## [")
          awk -v ver="$VERSION" '$0 ~ "^## \\["ver"\\]" {p=1; print; next} /^## \[/ {if (p) exit} p' CHANGELOG.md > release_notes.md
          [ -s release_notes.md ] || echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          # Idempotent: skip if the release already exists (e.g. created manually)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping."
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release_notes.md --verify-tag
          fi
