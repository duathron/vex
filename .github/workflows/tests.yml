name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint and test vex-ioc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dev dependencies
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q
